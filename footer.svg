<svg width="854" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fw1 { animation: fw1 4s ease-in-out infinite; }
      .fw2 { animation: fw2 5s ease-in-out infinite; }
      .fw3 { animation: fw3 6s ease-in-out infinite; }
      @keyframes fw1 {
        0%,100% { d: path("M0,40 C120,80 280,10 427,55 C574,100 720,20 854,50 L854,100 L0,100 Z"); }
        50%      { d: path("M0,60 C150,20 300,90 427,45 C554,0 700,80 854,60 L854,100 L0,100 Z"); }
      }
      @keyframes fw2 {
        0%,100% { d: path("M0,55 C180,95 350,15 500,65 C650,110 760,30 854,55 L854,100 L0,100 Z"); }
        50%      { d: path("M0,35 C200,5 380,85 530,40 C670,0 780,70 854,45 L854,100 L0,100 Z"); }
      }
      @keyframes fw3 {
        0%,100% { d: path("M0,65 C100,30 250,90 427,60 C600,30 740,85 854,65 L854,100 L0,100 Z"); }
        50%      { d: path("M0,45 C130,75 300,20 427,55 C554,90 700,35 854,50 L854,100 L0,100 Z"); }
      }
      .wave { fill: #00D9FF; }
      @media (prefers-color-scheme: light) {
        .wave { fill: #0969DA; }
      }
    </style>
  </defs>
  <path class="fw3 wave" d="M0,65 C100,30 250,90 427,60 C600,30 740,85 854,65 L854,100 L0,100 Z" opacity="0.07"/>
  <path class="fw2 wave" d="M0,55 C180,95 350,15 500,65 C650,110 760,30 854,55 L854,100 L0,100 Z" opacity="0.10"/>
  <path class="fw1 wave" d="M0,40 C120,80 280,10 427,55 C574,100 720,20 854,50 L854,100 L0,100 Z" opacity="0.18"/>
</svg>
