name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: rub1kub
          outputs: |
            src/github-snake.svg
            src/github-snake-dark.svg?palette=github-dark

      - run: git config user.name "github-actions" && git config user.email "github-actions@github.com"

      - run: |
          git checkout --orphan output 2>/dev/null || git checkout output
          git rm -rf . --quiet || true
          mv src/github-snake.svg . 2>/dev/null || true
          mv src/github-snake-dark.svg . 2>/dev/null || true
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Update snake" --allow-empty
          git push origin output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
